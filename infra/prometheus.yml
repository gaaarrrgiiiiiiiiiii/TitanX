global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    service: titanx

scrape_configs:
  - job_name: 'matching-engine'
    static_configs:
      - targets: ['matching-engine:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 2s   # Higher frequency for latency metrics

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']   # postgres_exporter sidecar

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
